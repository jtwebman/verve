name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERVE_ZIG: zig
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build

      - name: Run fast tests
        run: zig build test

      - name: Run compile tests
        run: zig build test-compile

      - name: Run network tests
        run: zig build test-slow

      - name: Type check examples
        run: |
          for f in examples/*.vv; do
            echo "Checking $f..."
            ./zig-out/bin/verve check "$f" || true
          done

      - name: Run verifier
        run: ./zig-out/bin/verve test examples/tested.vv
