name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build

      - name: Parser tests
        run: zig test src/parser_test.zig

      - name: Parser error tests
        run: zig test src/parser_error_test.zig

      - name: Checker tests
        run: zig test src/checker_test.zig

      - name: Process tests
        run: zig test src/process_test.zig

      - name: Interpreter tests
        run: zig test src/interpreter_test.zig

      - name: Verifier tests
        run: zig test src/verifier_test.zig

      - name: Type check all examples
        run: |
          for f in examples/*.vv; do
            echo "Checking $f..."
            zig build run -- check "$f"
          done

      - name: Run examples
        run: |
          zig build run -- run examples/hello.vv
          zig build run -- run examples/counter.vv
          zig build run -- run examples/multi.vv
          zig build run -- run examples/supervisor.vv
          zig build run -- run examples/lists.vv

      - name: Run verifier
        run: zig build run -- test examples/tested.vv
